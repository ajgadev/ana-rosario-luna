<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ana Rosario Luna · Psicóloga sanitaria · Madrid &amp; online</title>
  <meta name="description" content="Psicóloga colegiada en Madrid. Terapia individual, de pareja y online para adultos. Primera consulta orientativa gratuita."/>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=DM+Serif+Display:ital@0;1&family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="styles.css"/>

  <style>
    /* Print-friendly tweaks: keep on-screen identical, optimize PDF output */
    @page {
      size: A4 portrait;
      margin: 12mm 10mm;
    }
    @media print {
      html, body {
        background: #FAF6F0 !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      /* Strip sticky nav so the masthead prints once at the top */
      .nav {
        position: static !important;
        background: transparent !important;
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
        border-bottom: 1px solid var(--line) !important;
      }
      .nav .nav-cta,
      .hamburger,
      .mobile-menu {
        display: none !important;
      }

      /* Kill in-design Tweaks panel + decorative chrome that confuses print */
      .tweaks-panel,
      [class*="tweaks"],
      .hero-blob,
      .contact-blob {
        display: none !important;
      }

      /* Tighten section rhythm for paged output */
      section {
        padding: 48px 0 !important;
        break-inside: avoid-page;
      }
      .hero {
        padding: 32px 0 56px !important;
      }
      .contact {
        break-before: page;
      }
      .foot {
        break-before: avoid;
        padding: 40px 0 24px !important;
      }

      /* Help long lists/blocks not get orphaned */
      .service, .step-card, .testi-card, .blog-card,
      .faq-item, .trust-item, .about-grid, .contact-grid,
      .testimonial-stage .t-card {
        break-inside: avoid;
      }
      h1, h2, h3 {
        break-after: avoid;
      }

      /* Force every testimonial visible (carousel hides via display:none) */
      .testimonial-stage .t-card {
        display: block !important;
        margin-bottom: 24px;
        padding: 24px;
        background: var(--cream, rgba(243,236,223,0.06));
        border: 1px solid rgba(243,236,223,0.15);
        border-radius: 8px;
      }
      .t-controls { display: none !important; }

      /* Expand every FAQ answer */
      .faq-item .faq-a {
        max-height: none !important;
        padding: 0 0 24px !important;
      }
      .faq-toggle { display: none !important; }

      /* Reveal-on-scroll defaults can leave content invisible if IO never fires */
      .reveal { opacity: 1 !important; transform: none !important; }

      /* Keep CTAs visible but not interactive */
      .btn, .btn-primary, .btn-ghost {
        box-shadow: none !important;
      }

      /* Disable animations */
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
      }

      a { color: inherit !important; text-decoration: none !important; }
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    // Wait until React has mounted, fonts have loaded, and reveal-on-scroll
    // animations have had a moment to mark themselves visible; only then print.
    (async function autoPrint() {
      const root = document.getElementById("root");
      // Wait for React render
      for (let i = 0; i < 60 && (!root || root.children.length === 0); i++) {
        await new Promise(r => setTimeout(r, 100));
      }
      // Force all reveal sections visible (in case IO never fires while printing)
      document.querySelectorAll(".reveal").forEach(el => el.classList.add("in"));
      // Wait for fonts
      if (document.fonts && document.fonts.ready) {
        try { await document.fonts.ready; } catch (e) {}
      }
      // Safety delay
      await new Promise(r => setTimeout(r, 700));
      window.print();
    })();
  </script>
</body>
</html>
